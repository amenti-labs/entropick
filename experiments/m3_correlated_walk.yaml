# M3: Correlated Walk experiment.
# Per-request walk position that drifts based on quantum entropy.
# Creates temporal correlations across tokens within a request.
#
# Walk evolves: new_pos = (pos + step * (qval - 0.5)) % 1.0

name: m3_correlated_walk
description: Per-request correlated walk with quantum entropy

env:
  QR_ENTROPY_SOURCE_TYPE: system
  QR_FALLBACK_MODE: system
  QR_TEMPERATURE_STRATEGY: fixed
  QR_FIXED_TEMPERATURE: "0.7"
  QR_TOP_K: "50"
  QR_TOP_P: "0.95"
  QR_WALK_STEP: "0.1"
  QR_WALK_INITIAL_POSITION: "0.5"

# Sweep suggestions for walk_step:
#   gentle:  QR_WALK_STEP=0.05
#   medium:  QR_WALK_STEP=0.1
#   strong:  QR_WALK_STEP=0.2
