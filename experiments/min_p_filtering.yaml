# Min-P filtering experiment.
# Dynamic probability floor: removes tokens with p < min_p * max(p).
# Unlike top-k (fixed count) or top-p (fixed mass), min-p scales
# the threshold with model confidence.

name: min_p_filtering
description: Min-P dynamic probability floor filtering

env:
  QR_ENTROPY_SOURCE_TYPE: system
  QR_FALLBACK_MODE: system
  QR_TEMPERATURE_STRATEGY: fixed
  QR_FIXED_TEMPERATURE: "0.7"
  QR_MIN_P: "0.1"

# Sweep suggestions for min_p:
#   gentle:  QR_MIN_P=0.05   (minimal filtering)
#   medium:  QR_MIN_P=0.1    (moderate filtering)
#   strong:  QR_MIN_P=0.3    (aggressive filtering)
#   strict:  QR_MIN_P=0.5    (only top-tier tokens survive)
