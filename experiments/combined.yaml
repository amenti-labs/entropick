# Combined experiment: all three injection methods active.
# Logit Perturbation + Temperature Modulation + Selection Drift
#
# Use mild settings for each to study their interaction.

name: combined
description: All injection methods active with mild settings

env:
  QR_ENTROPY_SOURCE_TYPE: system
  QR_FALLBACK_MODE: system
  QR_TEMPERATURE_STRATEGY: fixed
  QR_FIXED_TEMPERATURE: "0.7"
  QR_TOP_K: "50"
  QR_TOP_P: "0.95"
  # Logit Perturbation
  QR_LOGIT_PERTURBATION_ALPHA: "0.1"
  QR_LOGIT_PERTURBATION_SIGMA: "1.0"
  # Temperature Modulation
  QR_TEMP_MODULATION_BETA: "0.2"
  # Selection Drift
  QR_DRIFT_STEP: "0.05"
  QR_DRIFT_INITIAL_POSITION: "0.5"
