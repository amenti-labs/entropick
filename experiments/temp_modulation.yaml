# Temperature Modulation experiment.
# Per-token temperature modulation via quantum entropy.
#
# Formula: new_temp = temp * (1 + beta * (u - 0.5))
# where u is a quantum-derived uniform value.

name: temp_modulation
description: Quantum temperature modulation (Entropy Seeding Benchmark)

env:
  QR_ENTROPY_SOURCE_TYPE: system
  QR_FALLBACK_MODE: system
  QR_TEMPERATURE_STRATEGY: fixed
  QR_FIXED_TEMPERATURE: "0.7"
  QR_TOP_K: "50"
  QR_TOP_P: "0.95"
  QR_TEMP_MODULATION_BETA: "0.5"

# Sweep suggestions for beta:
#   mild:   QR_TEMP_MODULATION_BETA=0.2
#   medium: QR_TEMP_MODULATION_BETA=0.5
#   strong: QR_TEMP_MODULATION_BETA=1.5
